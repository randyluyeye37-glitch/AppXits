<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>XITS · Assistente Pessoal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00ff9d">
<style>
:root {
  --primary: #00ff9d;
  --bg: #03050a;
  --text: #dff5ec;
  --card: #0c141f;
}
[data-theme="light"] {
  --bg: #f8fafc;
  --text: #0f172a;
  --card: #ffffff;
  --primary: #00b374;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', monospace;
  min-height: 100vh;
  transition: background 0.4s;
}
header {
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(0,255,157,0.2);
}
.orb {
  width: 180px; height: 180px;
  margin: 30px auto;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 30%, #fff, var(--primary));
  box-shadow: 0 0 80px var(--primary);
  animation: pulse 2s infinite ease-in-out;
  cursor: pointer;
  position: relative;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
#status {
  text-align: center;
  font-size: 0.9rem;
  letter-spacing: 2px;
  margin: 10px 0;
}
.theme-toggle {
  background: none;
  border: none;
  font-size: 1.6rem;
  cursor: pointer;
}
.login-screen, .main-app { display: none; }
.login-screen.active, .main-app.active { display: block; }
input, button {
  padding: 12px;
  margin: 8px;
  border-radius: 8px;
  border: 1px solid var(--primary);
  background: var(--card);
  color: var(--text);
}
button {
  background: var(--primary);
  color: #000;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body data-theme="dark">

<header>
  <h1>XITS</h1>
  <button class="theme-toggle" id="themeBtn">🌙</button>
</header>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen active">
  <div style="max-width:380px;margin:80px auto;padding:20px;text-align:center">
    <h2>Bem-vindo, Randy</h2>
    <input type="text" id="username" placeholder="Usuário" value="randy">
    <input type="password" id="password" placeholder="Senha" value="123456">
    <button onclick="login()">ENTRAR</button>
    <p style="margin-top:20px;font-size:0.8rem">Demo • Sem senha real</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="main-app">
  <div class="orb" id="orb" onclick="toggleOrb()"></div>
  <div id="status">OCIOSO • Diga "Xits"</div>
  
  <div style="max-width:700px;margin:20px auto;padding:15px">
    <input type="text" id="chatInput" placeholder="Digite sua mensagem..." style="width:100%" onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()" style="width:100%">ENVIAR</button>
  </div>

  <div id="transcript" style="max-width:700px;margin:20px auto;padding:15px;min-height:200px"></div>
</div>

<script>
let isDark = true;
let isLogged = false;

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}

function login() {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('mainApp').classList.add('active');
  addMessage("assistant", "Sistemas online. Olá Randy, em que posso ajudar?");
}

function addMessage(sender, text) {
  const div = document.createElement('div');
  div.style.margin = "12px 0";
  div.style.padding = "12px";
  div.style.borderRadius = "8px";
  div.style.background = sender === "user" ? "#1a2a22" : "var(--card)";
  div.innerHTML = `<strong>${sender === "user" ? "Você" : "XITS"}</strong><br>${text}`;
  document.getElementById('transcript').appendChild(div);
  div.scrollIntoView();
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  if (!input.value.trim()) return;
  addMessage("user", input.value);
  const q = input.value;
  input.value = "";
  
  setTimeout(() => {
    addMessage("assistant", "Entendido. Estou processando sua solicitação...");
  }, 800);
}

function toggleOrb() {
  const orb = document.getElementById('orb');
  orb.style.animation = 'pulse 0.6s';
  setTimeout(() => orb.style.animation = 'pulse 2s infinite ease-in-out', 600);
  addMessage("assistant", "Estou ouvindo...");
}

// Theme toggle
document.getElementById('themeBtn').addEventListener('click', toggleTheme);

// Init
console.log("%cXITS v5.0 - Carregado com sucesso", "color:#00ff9d;font-size:14px");
</script>
</body>
</html>
